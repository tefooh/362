# testing locally with act cli

# act -W .github/workflows/ci.yml --container-architecture linux/amd64 -env ACTIONS_RUNTIME_URL=http://host.docker.internal:8080/ --env ACTIONS_RUNTIME_TOKEN=foo --env ACTIONS_CACHE_URL=http://host.docker.internal:8080/ --artifact-server-path out -j build-ubuntu -P ubuntu-latest=-self-hosted --env-file .env --secret-file .secrets

name: Rust CI

on:
  push:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'
  pull_request:
    paths:
      - '**.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '.github/workflows/ci.yml'
      - '.github/scripts/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.event_name == 'push' && github.ref == 'refs/heads/main' && github.sha || github.ref }}
  # Cancel superseded runs on PR branches (saves minutes when a contributor
  # rapidly re-pushes). Main pushes use the commit SHA in the group so a
  # newer merge does not sit pending behind a stale long-running commit.
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' }}

env:
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  test-ubuntu:
    runs-on: ubuntu-latest
    env:
      RUSTFLAGS: "-C link-arg=-Wl,--allow-multiple-definition"
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          # The explicit rust-cache step below is the single cache layer.
          # cache: true ran Swatinem/rust-cache a second time next to the
          # plain actions/cache this replaced — two ~1 GB saves of the same
          # artifacts per run, which fed the repo-wide cache eviction
          # (>20 GB active vs GitHub's 10 GB limit) that kept every Rust CI
          # restore cold.
          cache: false
          rustflags: ""

      - name: Rust cache
        # Replaces actions/cache keyed exactly on hashFiles(Cargo.lock) with
        # no restore-keys — any lockfile bump meant a fully cold 20+ min
        # build. rust-cache falls back to the closest previous cache on a
        # prefix match, so only changed deps rebuild. Restore/save is an
        # optimization only; a transient GHA cache service error must never
        # fail the job (same rationale as e2e-test.yml).
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-ubuntu
          cache-bin: false

      # After rust-cache on purpose — see the action's ordering note.
      - name: Setup sccache (shared R2 compile cache)
        uses: ./.github/actions/setup-sccache
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          read-access-key-id: ${{ secrets.SCCACHE_R2_READ_ACCESS_KEY_ID }}
          read-secret-access-key: ${{ secrets.SCCACHE_R2_READ_SECRET_ACCESS_KEY }}
          write-access-key-id: ${{ secrets.SCCACHE_R2_WRITE_ACCESS_KEY_ID }}
          write-secret-access-key: ${{ secrets.SCCACHE_R2_WRITE_SECRET_ACCESS_KEY }}

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.2

      - name: Install dependencies
        run: .github/scripts/install_dependencies.sh

      - name: Copy test image
        run: |
          mkdir -p target/debug/deps
          cp crates/project-362-screen/tests/testing_OCR.png target/debug/deps/

      - name: Run cargo tests
        run: cargo test --workspace --exclude project-362-rfdetr-mlx

  test-windows:
    # windows-2019 reached end-of-life on the GitHub-hosted runner fleet
    # (deprecation message in CI logs since mid-2025). Stay on a supported
    # image so we keep getting security patches and can pin a stable build
    # toolchain.
    runs-on: windows-2022
    env:
      # Single source of truth for the ONNX Runtime version. Referenced by
      # the download URL, the extract dirname, the DLL staging src path, and
      # the PATH-append step below. Bump this in one place instead of four.
      ONNXRUNTIME_VERSION: "1.24.2"
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Install Rust
        run: |
          Invoke-WebRequest https://static.rust-lang.org/rustup/dist/x86_64-pc-windows-gnu/rustup-init.exe -OutFile rustup-init.exe
          .\rustup-init.exe -y

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          # See test-ubuntu: the explicit rust-cache step below is the
          # single cache layer; cache: true would save a duplicate.
          # The removed actions/cache here was doubly broken — its
          # ~\AppData\Local\cargo\ path isn't CARGO_HOME on GitHub
          # runners (that's ~\.cargo), so the registry half cached junk.
          cache: false
          rustflags: ""

      - name: Rust cache
        # See test-ubuntu — prefix-fallback restore, single cache layer,
        # never fail the job on a cache service error.
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-windows
          cache-bin: false

      # After rust-cache on purpose — see the action's ordering note.
      - name: Setup sccache (shared R2 compile cache)
        uses: ./.github/actions/setup-sccache
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          read-access-key-id: ${{ secrets.SCCACHE_R2_READ_ACCESS_KEY_ID }}
          read-secret-access-key: ${{ secrets.SCCACHE_R2_READ_SECRET_ACCESS_KEY }}
          write-access-key-id: ${{ secrets.SCCACHE_R2_WRITE_ACCESS_KEY_ID }}
          write-secret-access-key: ${{ secrets.SCCACHE_R2_WRITE_SECRET_ACCESS_KEY }}

      - name: setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.2

      - name: Set up MSVC
        uses: ilammy/msvc-dev-cmd@v1

      - name: Ensure 7-Zip is available
        shell: pwsh
        run: |
          # GitHub-hosted windows runners ship 7-Zip pre-installed, so this is
          # normally a no-op. Only download when it's genuinely missing, and
          # retry with backoff — the old unconditional Invoke-WebRequest hit
          # intermittent "Unable to connect to the remote server" from
          # 7-zip.org and failed the whole Windows job on unrelated PRs.
          $sevenZipDir = "C:\Program Files\7-Zip"
          if (Test-Path "$sevenZipDir\7z.exe") {
            echo "$sevenZipDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
            Write-Host "7-Zip already present at $sevenZipDir"
            exit 0
          }
          $7zipUrl = "https://7-zip.org/a/7z2301-x64.exe"
          $7zipInstaller = "7z-installer.exe"
          $downloaded = $false
          for ($i = 1; $i -le 5; $i++) {
            try {
              Invoke-WebRequest -Uri $7zipUrl -OutFile $7zipInstaller -UseBasicParsing -TimeoutSec 60
              $downloaded = $true
              break
            } catch {
              Write-Host "7-Zip download attempt $i failed: $($_.Exception.Message)"
              Start-Sleep -Seconds ([math]::Min(30, [math]::Pow(2, $i)))
            }
          }
          if (-not $downloaded) { throw "failed to download 7-Zip after 5 attempts" }
          Start-Process -FilePath .\$7zipInstaller -Args "/S" -Wait
          Remove-Item $7zipInstaller
          echo "$sevenZipDir" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append

      - name: Download ONNX Runtime (CPU)
        shell: pwsh
        run: |
          $version = "${{ env.ONNXRUNTIME_VERSION }}"
          $url = "https://github.com/microsoft/onnxruntime/releases/download/v$version/onnxruntime-win-x64-$version.zip"
          $zipFile = "onnxruntime-win-x64-$version.zip"
          $extractDir = "apps/project-362-app-tauri/src-tauri/onnxruntime-win-x64-$version"
          Invoke-WebRequest -Uri $url -OutFile $zipFile
          if (Test-Path $extractDir) { Remove-Item $extractDir -Recurse -Force }
          7z x $zipFile -o"apps/project-362-app-tauri/src-tauri/" -y
          Write-Host "ONNX Runtime extracted to $extractDir"

      - name: Run pre_build.js
        shell: bash
        run: bun ./scripts/pre_build.js
        working-directory: ./apps/project-362-app-tauri

      - name: Copy test image
        shell: bash
        run: |
          mkdir -p target/debug/deps || true
          cp crates/project-362-screen/tests/testing_OCR.png target/debug/deps/

      # ORT_STRATEGY=system tells ort to LINK against onnxruntime.lib but
      # does NOT copy onnxruntime*.dll next to the test binary. Without
      # the DLLs adjacent to the .exe at runtime, the Windows DLL loader
      # exits with STATUS_DLL_NOT_FOUND (0xc0000135) on the first
      # ort::api() call — which is exactly what test_process_ocr_task_windows
      # hits inside accuracy_test. Stage them before any cargo test that
      # touches ort. Run this once for all --profile release-dev/--target
      # builds — cargo test --profile release-dev --target
      # x86_64-pc-windows-msvc puts test binaries under
      # target/x86_64-pc-windows-msvc/release-dev/deps/.
      - name: Stage ONNX Runtime DLLs next to test binary
        shell: pwsh
        run: |
          $src = "${{ github.workspace }}/apps/project-362-app-tauri/src-tauri/onnxruntime-win-x64-${{ env.ONNXRUNTIME_VERSION }}/lib"
          $dst = "${{ github.workspace }}/target/x86_64-pc-windows-msvc/release-dev/deps"
          if (-not (Test-Path $dst)) {
            New-Item -ItemType Directory -Path $dst -Force | Out-Null
          }
          # Always remove + re-copy. Prior cancelled runs could leave
          # 0-byte stubs that Swatinem/rust-cache preserves across runs;
          # once cached, every subsequent test binary fails ORT load.
          # See e2e-test.yml for the same fix in the e2e-windows job.
          Get-ChildItem -Path $src -Filter "onnxruntime*.dll" | ForEach-Object {
            $dest = Join-Path $dst $_.Name
            if (Test-Path $dest) { Remove-Item -Path $dest -Force }
            [System.IO.File]::Copy($_.FullName, $dest, $true)
          }
          # ALSO stage VC++ runtime DLLs that onnxruntime.dll links
          # against. STATUS_DLL_NOT_FOUND on this job (4ea93ee75) was
          # NOT a missing onnxruntime.dll — the staging above produced
          # the right files (verified non-zero) and adding the lib dir
          # to PATH didn't help either. The missing DLL was a
          # transitive dep: onnxruntime.dll → vcruntime140{,_1}.dll +
          # msvcp140.dll. They live in C:\Windows\System32 on the
          # runner, but the Windows DLL loader's default search puts
          # the .exe's directory FIRST and there's a known case where
          # a different vcruntime alongside the binary (e.g. shipped
          # by a build dep) shadows the System32 one with an
          # incompatible version. release-cli.yml line 397 ships
          # these alongside project-362.exe for the same reason. Belt-
          # and-suspenders: stage them next to the test binary too.
          $crtSrc = "C:\Windows\System32"
          foreach ($crt in @("vcruntime140.dll", "vcruntime140_1.dll", "msvcp140.dll")) {
            $crtPath = Join-Path $crtSrc $crt
            if (Test-Path $crtPath) {
              $dest = Join-Path $dst $crt
              if (Test-Path $dest) { Remove-Item -Path $dest -Force }
              [System.IO.File]::Copy($crtPath, $dest, $true)
            } else {
              Write-Host "WARNING: $crt not in System32 — runner image may have changed"
            }
          }
          Get-ChildItem -Path $dst -Filter "*.dll" | Where-Object { $_.Name -match "(onnxruntime|vcruntime|msvcp)" } | ForEach-Object {
            if ($_.Length -eq 0) {
              throw "Staged DLL is 0 bytes: $($_.Name) — source likely corrupt"
            }
            Write-Host "$($_.Name)  $($_.Length) bytes"
          }

      # Add the ONNX lib dir to PATH for ALL cargo-test steps below.
      # The DLL staging step above does put onnxruntime*.dll next to the
      # test binaries (verified via Get-ChildItem), but accuracy_test
      # still exits 0xc0000135 (STATUS_DLL_NOT_FOUND) — the loader
      # resolves the .exe's adjacent dir BEFORE PATH only on the
      # primary DLL; transitive deps still go through standard search,
      # and on a sccache-restored deps/ at least one of those misses.
      # Prepending the lib dir to PATH makes the Windows DLL loader
      # find onnxruntime.dll + its providers via search regardless of
      # adjacent-file presence — same approach Tauri's release bundle
      # uses via resourcesMap on `--no-bundle`-skipped paths.
      - name: Add ONNX lib dir to PATH for cargo tests
        shell: pwsh
        run: |
          $ortLib = "${{ github.workspace }}/apps/project-362-app-tauri/src-tauri/onnxruntime-win-x64-${{ env.ONNXRUNTIME_VERSION }}/lib"
          echo $ortLib | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          Write-Host "PATH appended: $ortLib"

      - name: Run specific Windows OCR cargo test
        env:
          RUSTFLAGS: "-C link-arg=/LTCG"
          # Link ONNX Runtime via ort's download-binaries (pyke prebuilt), same as the
          # green release-app.yml. Setting ORT_LIB_LOCATION forces ort-sys into system
          # static-linking, which needs onnxruntime_common.lib + the static _deps tree
          # the dynamic MS prebuilt doesn't ship -> "ort-sys could not link" (#4173
          # fallout, after Windows x86_64 moved off load-dynamic). The MS zip staged
          # above still provides the runtime DLL.
          # Use prebuilt NASM objects on Windows: https://aws.github.io/aws-lc-rs/requirements/windows.html#prebuilt-nasm-objects
          AWS_LC_SYS_PREBUILT_NASM: "1"
        # --profile release-dev, not --release: the release profile is the
        # shipping profile (fat LTO, codegen-units=1) — pointlessly slow
        # codegen for tests. release-dev (thin LTO, 16 codegen units, same
        # opt-level) exists exactly for this; see root Cargo.toml.
        run: cargo test -p project-362-screen test_process_ocr_task_windows --profile release-dev --target x86_64-pc-windows-msvc

      - name: Run PII removal tests
        env:
          RUSTFLAGS: "-C link-arg=/LTCG"
          # Link ONNX Runtime via ort's download-binaries (pyke prebuilt), same as the
          # green release-app.yml. Setting ORT_LIB_LOCATION forces ort-sys into system
          # static-linking, which needs onnxruntime_common.lib + the static _deps tree
          # the dynamic MS prebuilt doesn't ship -> "ort-sys could not link" (#4173
          # fallout, after Windows x86_64 moved off load-dynamic). The MS zip staged
          # above still provides the runtime DLL.
          # Use prebuilt NASM objects on Windows: https://aws.github.io/aws-lc-rs/requirements/windows.html#prebuilt-nasm-objects
          AWS_LC_SYS_PREBUILT_NASM: "1"
        # release-dev, not release — see the OCR test step above.
        run: cargo test -p project-362-core pii_removal --profile release-dev --target x86_64-pc-windows-msvc

      - name: Run PII redaction tests
        env:
          RUSTFLAGS: "-C link-arg=/LTCG"
          # Link ONNX Runtime via ort's download-binaries (pyke prebuilt), same as the
          # green release-app.yml. Setting ORT_LIB_LOCATION forces ort-sys into system
          # static-linking, which needs onnxruntime_common.lib + the static _deps tree
          # the dynamic MS prebuilt doesn't ship -> "ort-sys could not link" (#4173
          # fallout, after Windows x86_64 moved off load-dynamic). The MS zip staged
          # above still provides the runtime DLL.
          # Use prebuilt NASM objects on Windows: https://aws.github.io/aws-lc-rs/requirements/windows.html#prebuilt-nasm-objects
          AWS_LC_SYS_PREBUILT_NASM: "1"
        # release-dev, not release — see the OCR test step above.
        run: cargo test -p project-362-engine --lib pii_redaction_tests --profile release-dev --target x86_64-pc-windows-msvc

      # pipes_test removed — pipe manager system deleted in #2212

  test-macos:
    # Pinned off `macos-latest`: that label rolled to the Xcode 26.5 image whose
    # clang toolchain is missing `clang_rt.osx`, so `cargo test`'s debug link
    # fails with `ld: library 'clang_rt.osx' not found` (green on the 3 prior
    # commits, then red on the next 2 with no related code change). macos-14
    # (Sonoma) has a complete toolchain and is proven here — e2e-macos.yml builds
    # project-362-screen on it and passes. Revisit when macos-latest is fixed.
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Set up Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable
          override: true
          # See test-ubuntu: the explicit rust-cache step below is the
          # single cache layer; cache: true would save a duplicate.
          cache: false
          rustflags: ""

      - name: Rust cache
        # See test-ubuntu — prefix-fallback restore, single cache layer,
        # never fail the job on a cache service error. cache-bin: false
        # also stops restoring a stale ~/.cargo/bin over the toolchain,
        # the failure mode the "Verify Rust toolchain" step below guards
        # against.
        continue-on-error: true
        uses: Swatinem/rust-cache@v2
        with:
          shared-key: ci-test-macos
          cache-bin: false

      # After rust-cache on purpose — see the action's ordering note.
      - name: Setup sccache (shared R2 compile cache)
        uses: ./.github/actions/setup-sccache
        with:
          r2-account-id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          read-access-key-id: ${{ secrets.SCCACHE_R2_READ_ACCESS_KEY_ID }}
          read-secret-access-key: ${{ secrets.SCCACHE_R2_READ_SECRET_ACCESS_KEY }}
          write-access-key-id: ${{ secrets.SCCACHE_R2_WRITE_ACCESS_KEY_ID }}
          write-secret-access-key: ${{ secrets.SCCACHE_R2_WRITE_SECRET_ACCESS_KEY }}

      - name: Verify Rust toolchain
        shell: bash
        run: |
          set -euo pipefail
          export PATH="$HOME/.cargo/bin:$PATH"
          echo "$HOME/.cargo/bin" >> "$GITHUB_PATH"

          cargo_output="$(cargo --version 2>&1 || true)"
          if [[ "$cargo_output" == *"rustup-init"* || "$cargo_output" != cargo* ]]; then
            curl --proto '=https' --tlsv1.2 --retry 5 --retry-connrefused -fsSL https://sh.rustup.rs | sh -s -- -y --profile minimal --default-toolchain stable
            . "$HOME/.cargo/env"
          fi

          rustup default stable
          rustup override set stable
          cargo --version
          rustc --version

      - name: setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.2

      - name: Install macOS media sidecars
        run: brew list ffmpeg >/dev/null 2>&1 || brew install ffmpeg

      - name: Run pre_build.js
        shell: bash
        env:
          SKIP_SCREENPIPE_SETUP: true # avoid trying to copy project-362 binaries, not yet built (next step)
          SCREENPIPE_RELEASE_TARGET: ${{ runner.arch == 'ARM64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin' }}
        run: bun ./scripts/pre_build.js
        working-directory: ./apps/project-362-app-tauri

      - name: Copy test image
        shell: bash
        run: |
          mkdir -p target/debug/deps || true
          cp crates/project-362-screen/tests/testing_OCR.png target/debug/deps/

      - name: Run specific Apple OCR cargo test
        shell: bash
        env:
          DYLD_LIBRARY_PATH: /Users/runner/work/project-362/project-362/crates/project-362-screen/lib
        # Only test vision package to avoid whisper-rs build issues on macOS CI
        run: cargo test -p project-362-screen test_apple_native_ocr

      - name: Run PII removal tests
        run: cargo test -p project-362-core pii_removal

      # PII redaction tests skipped on macOS due to whisper-rs build issues
      # - name: Run PII redaction tests
      #   run: cargo test -p project-362-engine --lib pii_redaction_tests
