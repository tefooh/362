name: Sentry Cleanup - Resolve Stale Issues

on:
  # Run after app releases
  workflow_run:
    workflows: ["Release App (Beta)"]
    types: [completed]
  # Weekly sweep
  schedule:
    - cron: "0 9 * * 1" # Monday 9am UTC
  # Manual trigger
  workflow_dispatch:
    inputs:
      version_gap:
        description: "Minimum version gap to auto-resolve (default: 5)"
        required: false
        default: "5"
      dry_run:
        description: "Dry run - only log what would be resolved"
        type: boolean
        default: false

concurrency:
  # Prevent overlapping cleanup runs (schedule + dispatch + post-release).
  group: ${{ github.workflow }}
  cancel-in-progress: false

env:
  GIT_LFS_SKIP_SMUDGE: 1

jobs:
  cleanup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Get current versions
        id: versions
        run: |
          APP_VERSION=$(grep '^version = ' apps/project-362-app-tauri/src-tauri/Cargo.toml | sed 's/version = "\(.*\)"/\1/')
          SERVER_VERSION=$(grep '^version = ' Cargo.toml | head -1 | sed 's/version = "\(.*\)"/\1/')
          echo "app_version=$APP_VERSION" >> $GITHUB_OUTPUT
          echo "server_version=$SERVER_VERSION" >> $GITHUB_OUTPUT
          echo "Current app version: $APP_VERSION"
          echo "Current server version: $SERVER_VERSION"

      - name: Resolve stale Sentry issues
        env:
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          APP_VERSION: ${{ steps.versions.outputs.app_version }}
          SERVER_VERSION: ${{ steps.versions.outputs.server_version }}
          VERSION_GAP: ${{ github.event.inputs.version_gap || '5' }}
          DRY_RUN: ${{ github.event.inputs.dry_run || 'false' }}
        run: |
          python3 << 'SCRIPT'
          import json
          import os
          import re
          import urllib.request
          import urllib.error

          SENTRY_TOKEN = os.environ["SENTRY_AUTH_TOKEN"]
          APP_VERSION = os.environ["APP_VERSION"]
          SERVER_VERSION = os.environ["SERVER_VERSION"]
          VERSION_GAP = int(os.environ.get("VERSION_GAP", "5"))
          DRY_RUN = os.environ.get("DRY_RUN", "false").lower() == "true"
          ORG_SLUG = "mediar"

          def sentry_request(url, method="GET", data=None):
              req = urllib.request.Request(url, method=method)
              req.add_header("Authorization", f"Bearer {SENTRY_TOKEN}")
              req.add_header("Content-Type", "application/json")
              if data:
                  req.data = json.dumps(data).encode()
              try:
                  resp = urllib.request.urlopen(req)
                  return json.loads(resp.read())
              except urllib.error.HTTPError as e:
                  print(f"  HTTP {e.code} for {url}")
                  return None

          def parse_version(release_str):
              """Extract semantic version from releases like 'project-362-app@2.5.84'."""
              m = re.search(r"@(\d+)\.(\d+)\.(\d+)", release_str or "")
              if m:
                  version = tuple(int(part) for part in m.groups())
                  return version, ".".join(str(part) for part in version)
              return None, None

          def parse_current_version(version_str):
              parts = version_str.split(".")
              if len(parts) < 3:
                  return None
              try:
                  return tuple(int(part) for part in parts[:3])
              except ValueError:
                  return None

          def get_current_version(project_slug):
              """Get the current semantic version for a project."""
              if project_slug == "project-362-app":
                  return parse_current_version(APP_VERSION)
              elif project_slug == "project-362-cli":
                  return parse_current_version(SERVER_VERSION)
              return None

          def version_gap(current_version, event_version):
              if not current_version or not event_version:
                  return None
              if current_version[:2] != event_version[:2]:
                  return None
              return current_version[2] - event_version[2]

          def should_resolve_version(current_version, event_version):
              if not current_version or not event_version:
                  return False, "unknown-version"
              if event_version[:2] < current_version[:2]:
                  return True, "older-major-minor"
              if event_version[:2] > current_version[:2]:
                  return False, "newer-major-minor"

              gap = current_version[2] - event_version[2]
              if gap >= VERSION_GAP:
                  return True, f"patch-gap-{gap}"
              return False, f"patch-gap-{gap}"

          def get_release_prefix(project_slug):
              if project_slug == "project-362-app":
                  return "project-362-app@"
              elif project_slug == "project-362-cli":
                  return "project-362-engine@"
              return None

          def get_release_tag(event):
              if not event:
                  return None
              for tag in event.get("tags", []):
                  if tag.get("key") == "release":
                      return tag.get("value")
              return event.get("release")

          def get_top_stack_frame(event):
              if not event:
                  return "stack=unavailable"
              for entry in event.get("entries", []):
                  if not isinstance(entry, dict) or entry.get("type") != "exception":
                      continue
                  data = entry.get("data") or {}
                  if not isinstance(data, dict):
                      continue
                  values = data.get("values") or []
                  for value in reversed(values):
                      if not isinstance(value, dict):
                          continue
                      stacktrace = value.get("stacktrace") or {}
                      if not isinstance(stacktrace, dict):
                          continue
                      frames = stacktrace.get("frames") or []
                      if not frames:
                          continue
                      frame = frames[-1]
                      if not isinstance(frame, dict):
                          continue
                      function = frame.get("function") or "<unknown>"
                      filename = frame.get("filename") or frame.get("absPath") or "<unknown>"
                      lineno = frame.get("lineno")
                      if lineno:
                          return f"top={function} ({filename}:{lineno})"
                      return f"top={function} ({filename})"
              return "stack=unavailable"

          def issue_context(issue, event, release_tag, full_ver, gap, reason):
              issue_url = issue.get("permalink") or issue.get("url") or ""
              culprit = issue.get("culprit") or "culprit=unknown"
              release_part = f"v{full_ver}" if full_ver else f"release={release_tag or 'missing'}"
              gap_part = f"gap={gap}" if gap is not None else "gap=n/a"
              reason_part = f"reason={reason}" if reason else "reason=unknown"
              return f"{release_part} ({gap_part}, {reason_part}) {get_top_stack_frame(event)} culprit={culprit} {issue_url}".strip()

          print(f"=== Sentry Cleanup ===")
          print(f"App version: {APP_VERSION}")
          print(f"Server version: {SERVER_VERSION}")
          print(f"Version gap threshold: {VERSION_GAP}")
          print(f"Dry run: {DRY_RUN}")
          print()

          resolved_count = 0
          skipped_count = 0

          for project in ["project-362-app", "project-362-cli"]:
              current_version = get_current_version(project)
              if current_version is None:
                  print(f"Could not determine current version for {project}, skipping")
                  continue

              current_patch = current_version[2]
              threshold_patch = current_patch - VERSION_GAP
              print(f"--- {project} ---")
              print(f"  Current version: {'.'.join(str(part) for part in current_version)}")
              print(f"  Patch threshold: {threshold_patch} (same major/minor only; older major/minor releases are stale)")
              print()

              # Fetch all unresolved issues for this project (use org-level endpoint for broader token compatibility)
              url = f"https://sentry.io/api/0/organizations/{ORG_SLUG}/issues/?query=is:unresolved+project:{project}&sort=date&limit=100"
              issues = sentry_request(url)
              if not issues:
                  print(f"  No issues found or error fetching")
                  continue

              for issue in issues:
                  short_id = issue["shortId"]
                  title = issue["title"].replace("\n", " ")[:180]
                  event_count = int(issue["count"])
                  user_count = int(issue.get("userCount", 0))
                  assignee = issue.get("assignedTo")
                  issue_id = issue["id"]

                  # Always fetch latest event before skipping. High-user
                  # issues are exactly the ones humans need release + stack
                  # detail for, and previously this workflow hid that data.
                  event_url = f"https://sentry.io/api/0/organizations/{ORG_SLUG}/issues/{issue_id}/events/latest/"
                  event = sentry_request(event_url)
                  release_tag = get_release_tag(event)
                  event_version, full_ver = parse_version(release_tag) if release_tag else (None, None)
                  gap = version_gap(current_version, event_version)
                  should_resolve, reason = should_resolve_version(current_version, event_version)
                  context = issue_context(issue, event, release_tag, full_ver, gap, reason)

                  # Skip if has assignee (someone is working on it)
                  if assignee:
                      print(f"  SKIP [{short_id}] has assignee {context} {event_count} events, {user_count} users - {title}")
                      skipped_count += 1
                      continue

                  # Skip if high user count (widespread, worth investigating)
                  if user_count >= 10:
                      print(f"  SKIP [{short_id}] high-user {context} {event_count} events, {user_count} users - {title}")
                      skipped_count += 1
                      continue

                  if not event:
                      continue

                  if not release_tag:
                      print(f"  KEEP [{short_id}] release=missing {context} {event_count} events, {user_count} users - {title}")
                      skipped_count += 1
                      continue

                  if event_version is None:
                      print(f"  KEEP [{short_id}] release-unparseable {context} {event_count} events, {user_count} users - {title}")
                      skipped_count += 1
                      continue

                  if should_resolve:
                      if DRY_RUN:
                          print(f"  WOULD RESOLVE [{short_id}] {context} {event_count} events, {user_count} users - {title}")
                      else:
                          # Resolve as "resolvedInNextRelease" so it auto-reopens if bug persists
                          resolve_url = f"https://sentry.io/api/0/issues/{issue_id}/"
                          result = sentry_request(resolve_url, method="PUT", data={
                              "status": "resolved",
                              "statusDetails": {"inNextRelease": True}
                          })
                          if result:
                              print(f"  RESOLVED [{short_id}] {context} {event_count} events, {user_count} users - {title}")
                              resolved_count += 1
                          else:
                              print(f"  FAILED to resolve [{short_id}]")
                  else:
                      print(f"  KEEP [{short_id}] {context} {event_count} events, {user_count} users - {title}")
                      skipped_count += 1

              print()

          print(f"=== Summary ===")
          print(f"Resolved: {resolved_count}")
          print(f"Skipped/Kept: {skipped_count}")
          if DRY_RUN:
              print("(DRY RUN - nothing was actually resolved)")
          SCRIPT
